
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Trắc Nghiệm AI - Bảo Mật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; min-height: 100vh; margin: 0; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .option-btn { transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { background: #1e293b; transform: translateX(4px); }
        .active-correct { background: #059669 !important; border-color: #10b981 !important; color: #fff !important; }
        .active-wrong { background: #991b1b !important; border-color: #ef4444 !important; color: #fff !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">
    
    <!-- Màn hình khóa -->
    <div id="lock-screen" class="w-full max-w-md glass-panel p-8 rounded-3xl space-y-6 shadow-2xl text-center">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
        <h2 class="text-xl font-bold">File Đã Được Khóa</h2>
        <p class="text-slate-400 text-sm">Vui lòng nhập mật khẩu để xem câu hỏi.</p>
        <div class="space-y-3">
            <input type="password" id="pass-input" placeholder="Nhập mật khẩu..." class="w-full p-4 bg-slate-950 border border-slate-800 rounded-2xl outline-none focus:border-blue-500 text-sm text-center">
            <button onclick="checkPassword()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold uppercase tracking-widest text-xs transition-all">Mở Khóa</button>
            <p id="error-msg" class="text-red-500 text-[10px] uppercase font-bold hidden">Mật khẩu sai!</p>
        </div>
    </div>

    <!-- Ứng dụng chính -->
    <div id="quiz-app" class="w-full max-w-3xl mx-auto space-y-6 hidden self-start">
        <header class="flex items-center justify-between mb-8">
            <h1 class="text-2xl font-bold text-white">Trắc Nghiệm <span class="text-blue-500">AI</span></h1>
            <div id="progress-text" class="text-xs font-bold text-slate-400 uppercase tracking-widest"></div>
        </header>

        <div id="quiz-screen" class="glass-panel rounded-3xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-indigo-500 opacity-50"></div>
            <div id="question-container" class="space-y-8">
                <div class="space-y-3">
                  <span class="text-blue-500 font-bold text-[10px] uppercase tracking-[0.3em] block">CÂU HỎI</span>
                  <h3 id="question-text" class="text-2xl font-medium leading-snug text-white"></h3>
                </div>
                <div id="options-grid" class="grid grid-cols-1 gap-3"></div>
                <div class="mt-8 flex justify-between items-center pt-8 border-t border-slate-700/50">
                    <button id="prev-btn" class="text-slate-500 text-sm font-bold uppercase tracking-widest hover:text-white disabled:opacity-30">Quay Lại</button>
                    <button id="next-btn" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-800 disabled:text-slate-600 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Tiếp Theo</button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="glass-panel rounded-3xl p-12 text-center space-y-8 hidden">
            <div class="inline-flex items-center justify-center w-28 h-28 rounded-full bg-blue-600/10 text-blue-500 border border-blue-500/20">
                <span id="final-score-percent" class="text-4xl font-bold">0%</span>
            </div>
            <h2 class="text-3xl font-bold text-white">Hoàn Thành!</h2>
            <p class="text-slate-400">Bạn đã trả lời đúng <span id="correct-count" class="text-white font-bold">0</span> / <span id="total-count" class="text-white">0</span> câu hỏi.</p>
            <button onclick="location.reload()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold text-xs uppercase tracking-widest transition-all">Làm Lại</button>
        </div>
    </div>

        let questions = JSON.parse(decodeURIComponent(escape(atob(encoded))));

        if (!hasPass) {
            document.getElementById('lock-screen').classList.add('hidden');
            document.getElementById('quiz-app').classList.remove('hidden');
            startQuiz();
        }

        function checkPassword() {
            const input = document.getElementById('pass-input').value;
            if (input === targetPass) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('quiz-app').classList.remove('hidden');
                document.body.classList.remove('flex', 'items-center', 'justify-center');
                startQuiz();
            } else {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        document.getElementById('pass-input')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        let currentIdx = 0;
        let answers = {};

        function startQuiz() {
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.text;
            document.getElementById('progress-text').innerText = `CÂU ${currentIdx + 1} / ${questions.length}`;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `option-btn flex items-center gap-5 p-5 rounded-2xl border text-left group ${answers[currentIdx] === idx ? 'border-blue-500 bg-blue-500/10 text-white' : 'border-slate-800 bg-slate-800/40 text-slate-300'}`;
                btn.innerHTML = `
                    <span class="w-10 h-10 flex items-center justify-center rounded-xl border font-bold ${answers[currentIdx] === idx ? 'bg-blue-600 border-transparent text-white' : 'bg-slate-900 border-slate-700 text-slate-500'}">${String.fromCharCode(65 + idx)}</span>
                    <span class="font-medium text-sm md:text-base leading-tight">${opt}</span>
                `;
                btn.onclick = () => selectOption(idx);
                grid.appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentIdx === 0;
            const nextBtn = document.getElementById('next-btn');
            nextBtn.disabled = answers[currentIdx] === undefined;
            nextBtn.innerText = currentIdx === questions.length - 1 ? 'Kết Thúc' : 'Tiếp Theo';
        }

        function selectOption(idx) {
            answers[currentIdx] = idx;
            renderQuestion();
        }

        document.getElementById('next-btn').onclick = () => {
            if (currentIdx < questions.length - 1) {
                currentIdx++;
                renderQuestion();
            } else {
                finishQuiz();
            }
        };

        document.getElementById('prev-btn').onclick = () => {
            if (currentIdx > 0) {
                currentIdx--;
                renderQuestion();
            }
        };

        function finishQuiz() {
            let score = 0;
            questions.forEach((q, idx) => {
                if (answers[idx] === q.correctAnswerIndex) score++;
            });

            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score-percent').innerText = Math.round((score / questions.length) * 100) + '%';
            document.getElementById('correct-count').innerText = score;
            document.getElementById('total-count').innerText = questions.length;
        }
    </script>
